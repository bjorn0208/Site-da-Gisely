<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap');
      .cls { font-family: 'Playfair Display', Times, serif; font-size: 280px; fill: #FFD43B; }
      .line { stroke: #FFD43B; stroke-width: 6; stroke-linecap: round; }
    </style>
    <filter id="drop" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.8"/>
    </filter>
  </defs>
  
  <rect width="500" height="500" fill="transparent" />
  
  <text class="cls" x="240" y="300" text-anchor="end" filter="url(#drop)">G</text>
  <text class="cls" x="250" y="360" text-anchor="start" filter="url(#drop)">D</text>
  <line class="line" x1="120" y1="380" x2="380" y2="120" filter="url(#drop)" />
</svg>
